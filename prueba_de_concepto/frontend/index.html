<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POC Nómina - Carga AHE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <div id="resultsPanel" class="hidden mt-8 animate-fade-in"></div>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col items-center py-10">

    <div class="max-w-3xl w-full bg-white shadow-xl rounded-lg p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">Importador de Horas Extras</h1>
        <p class="text-gray-500 mb-8">Arrastra tu archivo CSV para procesar las novedades en la base de datos.</p>

        <div id="dropzone" class="border-2 border-dashed border-gray-300 rounded-lg p-12 text-center cursor-pointer hover:bg-blue-50 hover:border-blue-400 transition-colors">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
            </svg>
            <p class="mt-4 text-sm text-gray-600 font-medium">Haz clic o arrastra un archivo CSV aquí</p>
            <input type="file" id="fileInput" class="hidden" accept=".csv" />
        </div>

        <div id="loading" class="hidden text-center py-10">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mx-auto"></div>
            <p class="mt-4 text-gray-600">Procesando registros, por favor espera...</p>
        </div>

        <div id="resultsPanel" class="hidden mt-8">
            <h2 class="text-xl font-semibold mb-4 border-b pb-2">Resumen de Procesamiento</h2>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-green-50 p-4 rounded-lg border border-green-200">
                    <p class="text-sm text-green-600 font-semibold">Registros Exitosos</p>
                    <p id="countSuccess" class="text-3xl font-bold text-green-700">0</p>
                </div>
                <div class="bg-red-50 p-4 rounded-lg border border-red-200">
                    <p class="text-sm text-red-600 font-semibold">Errores Encontrados</p>
                    <p id="countErrors" class="text-3xl font-bold text-red-700">0</p>
                </div>
            </div>

            <div id="errorContainer" class="hidden">
                <h3 class="text-lg font-medium text-gray-800 mb-2">Detalle de Errores</h3>
                <div class="bg-gray-50 border rounded-lg max-h-64 overflow-y-auto">
                    <ul id="errorList" class="divide-y divide-gray-200 text-sm text-gray-600">
                        </ul>
                </div>
            </div>

            <button onclick="location.reload()" class="mt-6 w-full bg-blue-600 text-white font-medium py-2 px-4 rounded hover:bg-blue-700 transition">
                Cargar un nuevo archivo
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
